<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ScriptSchedule"/>
<meta name="theme-color" content="#1e1610"/>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>ScriptSchedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1e1610;color:#f0e6d8;font-family:Georgia,'Times New Roman',serif;min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanMove{0%,100%{top:20%}50%{top:70%}}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#3a2e24;border-radius:2px}
/* ── INSTALL BANNER ── */
#install-banner{position:fixed;bottom:0;left:0;right:0;background:#2a1f14;border-top:2px solid #c9a66b;padding:18px 18px 36px;z-index:99999;transform:translateY(110%);transition:transform .45s cubic-bezier(.34,1.4,.64,1);box-shadow:0 -12px 48px rgba(0,0,0,.7)}
#install-banner.show{transform:translateY(0)}
.ib-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.ib-icon{width:50px;height:50px;border-radius:13px;overflow:hidden;flex-shrink:0;box-shadow:0 4px 16px rgba(201,166,107,.3)}
.ib-icon img{width:100%;height:100%;object-fit:cover}
.ib-words h3{font-size:16px;font-weight:700;color:#f0e6d8;font-family:Georgia,serif;line-height:1.3}
.ib-words p{font-size:12px;color:#a0896e;margin-top:3px;font-family:Georgia,serif}
.ib-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#a0896e;font-size:24px;cursor:pointer;padding:6px;line-height:1}
#btn-install{width:100%;background:#c9a66b;color:#1a1008;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:700;font-family:Georgia,serif;cursor:pointer;letter-spacing:.02em}
#btn-install:active{background:#b8954f;transform:scale(.98)}
#ios-steps{display:none;flex-direction:column;gap:9px}
.ios-step{display:flex;align-items:center;gap:12px;background:#1e1610;border:1px solid #3d2e1a;border-radius:11px;padding:12px 14px}
.snum{width:24px;height:24px;background:#c9a66b;color:#1a1008;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sico{font-size:20px;flex-shrink:0}
.stxt{font-size:13px;color:#f0e6d8;font-family:Georgia,serif;line-height:1.4}
.stxt b{color:#c9a66b}

/* LAYOUT */
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
header{background:linear-gradient(135deg,#1a1008,#2a1f14);border-bottom:1px solid #3a2e24;position:sticky;top:0;z-index:50}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-img{width:42px;height:42px;border-radius:10px;object-fit:cover}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-0.02em;color:#f0e6d8}
.logo-sub{font-size:10px;color:#c9a66b;letter-spacing:.12em;text-transform:uppercase}
.header-date{font-size:13px;color:#a08a7a;font-style:italic}

/* PEOPLE BAR */
.people-section{background:#1a1208;border-bottom:1px solid #2a2018}
.people-bar{display:flex;gap:6px 8px;padding:8px 14px;flex-wrap:nowrap;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.people-bar::-webkit-scrollbar{display:none}
.person-wrap{position:relative;display:flex;align-items:center;flex-shrink:0;}
.person-btn{display:flex;align-items:center;gap:6px;border:1px solid #3a2e24;border-radius:20px;padding:6px 14px;background:transparent;color:#d9c7b9;cursor:pointer;white-space:nowrap;font-size:13px;font-family:Georgia,serif;flex-shrink:0;}
.person-btn.active{font-weight:700}
.avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#1a1008;flex-shrink:0}
.remove-btn{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#5a2a1a;color:#e8a090;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.add-person-btn{border:1px dashed #5a4a43;border-radius:20px;padding:6px 12px;background:transparent;color:#8a7a70;cursor:pointer;white-space:nowrap;font-size:13px;font-family:Georgia,serif;flex-shrink:0;}
.add-person-input{display:flex;align-items:center;gap:4px;flex-shrink:0}
.person-name-input{padding:5px 10px;border-radius:20px;border:1px solid #c9a66b;background:#1e1610;color:#f0e6d8;font-size:13px;width:90px;outline:none;font-family:Georgia,serif}
.confirm-btn{background:#4a7c59;color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px}
.cancel-btn{background:#5a2a1a;color:#e8a090;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px}

/* NAV */
nav{display:flex;border-bottom:1px solid #2a2018;background:#1a1208;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:56px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;background:transparent;border:none;color:#8a7a70;cursor:pointer;font-size:10px;font-family:Georgia,serif;white-space:nowrap}
.nav-btn.active{color:#c9a66b;border-bottom:2px solid #c9a66b}
.nav-icon{font-size:16px}

/* MAIN */
main{padding:14px 14px 80px;animation:fadeIn .3s ease}

/* CARDS */
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#261e16;border:1px solid;border-radius:14px;padding:14px 10px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:#c9a66b}
.stat-label{font-size:11px;color:#8a7a70;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.progress-card{background:#261e16;border-radius:14px;padding:14px;margin-bottom:14px}
.progress-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;color:#d9c7b9}
.progress-track{height:8px;background:#3a2e24;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a66b,#e8c87a);border-radius:4px;transition:width .6s ease}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.add-btn{background:#c9a66b;color:#1a1008;border:none;border-radius:20px;padding:6px 14px;font-weight:700;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.back-btn{background:transparent;border:none;color:#c9a66b;cursor:pointer;font-size:14px;padding:0;font-family:Georgia,serif}
.empty-state{text-align:center;padding:30px 20px;color:#8a7a70;font-size:15px}

/* MED CARD */
.med-card{background:#261e16;border-radius:14px;padding:14px;margin-bottom:10px;border-left:3px solid;transition:opacity .3s}
.med-card.taken{opacity:.65}
.med-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.med-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
.med-name{font-size:16px;font-weight:700;color:#f0e6d8}
.med-meta{font-size:13px;color:#a08a7a;margin-top:2px}
.med-notes{font-size:12px;color:#8a7a70;margin-top:4px;font-style:italic}
.person-tag{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.med-next-due{font-size:12px;color:#8a7a70;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.taken-badge{background:#2a4a34;color:#8cc49a;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.med-btns{display:flex;gap:8px}
.btn-take{flex:1;background:#c9a66b;color:#1a1008;border:none;border-radius:10px;padding:8px;font-weight:700;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.btn-edit{flex:1;background:#3a2e24;color:#d9c7b9;border:none;border-radius:10px;padding:8px;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.btn-delete{flex:1;background:#3a1a14;color:#e8a090;border:none;border-radius:10px;padding:8px;cursor:pointer;font-size:13px;font-family:Georgia,serif}

/* FORM */
.form-card{background:#261e16;border-radius:16px;padding:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-label{display:flex;flex-direction:column;gap:5px;font-size:12px;color:#a08a7a;letter-spacing:.05em;text-transform:uppercase}
.form-label.full{grid-column:1/-1}
.form-input{padding:10px 12px;border-radius:10px;border:1px solid #3a2e24;background:#1e1610;color:#f0e6d8;font-size:14px;font-family:Georgia,serif;width:100%}
.form-input:focus{outline:1px solid #c9a66b}
textarea.form-input{min-height:72px;resize:vertical}
.submit-btn{width:100%;background:linear-gradient(135deg,#c9a66b,#e8c87a);color:#1a1008;border:none;border-radius:12px;padding:13px;font-weight:700;cursor:pointer;font-size:15px;font-family:Georgia,serif;margin-top:4px}

/* SCAN */
.scan-card{background:#261e16;border-radius:16px;padding:16px}
.scan-frame{height:220px;background:#1a1208;border-radius:14px;border:2px dashed #3a2e24;display:flex;align-items:center;justify-content:center;margin-bottom:14px;position:relative;overflow:hidden}
.scan-frame.active{border-color:#c9a66b}
.scan-placeholder{text-align:center;color:#d9c7b9;font-size:14px}
.scan-placeholder .icon{font-size:44px;margin-bottom:8px}
.scan-overlay{position:absolute;inset:0;background:rgba(26,16,8,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c9a66b;font-size:13px;font-weight:600}
.scan-img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.scan-btn-row{display:flex;gap:10px;margin-bottom:12px}
.scan-btn{flex:1;background:#3a2e24;color:#d9c7b9;border:1px solid #4a3e34;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;font-family:Georgia,serif;text-align:center;display:block}
.scan-btn.secondary{background:#2a2018}
.scan-result-card{background:#1a1208;border-radius:14px;padding:14px;margin-top:12px;border:1px solid #3a4e38}
.scan-result-title{color:#8cc49a;font-weight:700;font-size:14px;margin-bottom:10px}
.scan-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2a2018;font-size:13px}
.scan-key{color:#8a7a70;text-transform:uppercase;font-size:11px;letter-spacing:.05em}
.scan-val{color:#f0e6d8;font-weight:600}
.hint-text{color:#5a4a43;font-size:11px;text-align:center;margin-top:8px;line-height:1.6}
.error-box{background:#3a1a14;border:1px solid #8a4b3a;border-radius:12px;padding:12px;color:#e8a090;font-size:13px;margin-bottom:12px;line-height:1.6}

/* PILL ID */
.tab-switch{display:flex;background:#261e16;border-radius:12px;padding:4px;margin-bottom:16px}
.tab-btn{flex:1;padding:8px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-family:Georgia,serif;transition:all .2s}
.tab-btn.active{background:#c9a66b;color:#1a1008;font-weight:700}
.tab-btn:not(.active){background:transparent;color:#8a7a70}
.pill-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.pill-stat{background:#1e1610;border-radius:10px;padding:8px 10px}
.pill-stat-label{font-size:10px;color:#8a7a70;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.pill-stat-val{font-size:13px;font-weight:600;color:#f0e6d8}
.tag{font-size:12px;padding:4px 10px;border-radius:20px;background:#2a2018;color:#d9c7b9;border:1px solid #3a3020}
.allergy-tag{font-size:12px;padding:4px 10px;border-radius:20px;background:#4a1a14;color:#e8908a;border:1px solid #7a2a20}
.diagnosis-tag{font-size:12px;padding:4px 10px;border-radius:20px;background:#2a3a4a;color:#8fa8c8;border:1px solid #3a4a5a}
.ix-row{padding:10px 0;border-bottom:1px solid #2a2018}
.severity-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;text-transform:uppercase}

/* EMERGENCY */
.emergency-header{background:linear-gradient(135deg,#7a1010,#b02020);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.emergency-card{background:#261e16;border-radius:14px;padding:14px;margin-bottom:10px}
.section-title-sm{font-size:12px;font-weight:700;color:#c9a66b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.emergency-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.emergency-stat{background:#1e1610;border-radius:10px;padding:10px 12px}
.emergency-med-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid #2a2018}

/* REPORT */
.report-header{background:linear-gradient(135deg,#1a1008,#2a1f14);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;border:1px solid #3a2e24}
.range-btns{display:flex;gap:8px;margin-bottom:14px}
.range-btn{flex:1;padding:8px;border-radius:10px;border:1px solid #3a2e24;background:transparent;color:#d9c7b9;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.range-btn.active{background:#c9a66b;color:#1a1008;font-weight:700}

/* DOCS */
.doc-upload-area{margin-bottom:14px}
.doc-upload-label{font-size:11px;color:#8a7a70;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.doc-upload-row{display:flex;gap:8px}
.doc-upload-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:#261e16;border:1px solid #3a2e24;border-radius:12px;padding:12px 8px;color:#d9c7b9;text-align:center;cursor:pointer;font-family:Georgia,serif;font-size:12px}
.doc-upload-btn.primary{flex:2;background:linear-gradient(135deg,#c9a66b,#e8c87a);color:#1a1008;font-weight:700}
.doc-upload-btn .icon{font-size:20px}
.doc-card{width:100%;background:#261e16;border-radius:14px;padding:14px;margin-bottom:10px;border-left:3px solid;cursor:pointer;border-top:none;border-right:none;border-bottom:none;text-align:left;display:block}
.doc-icon{font-size:22px;width:36px;height:36px;background:#1e1610;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-type-badge{font-size:11px;padding:3px 8px;border-radius:10px;background:#3a2e24;color:#c9a66b;font-weight:600}
.lab-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #2a2018;font-size:13px}
.lab-label{color:#a08a7a}
.lab-value{font-weight:700}
.flag-high{color:#e8a090}
.flag-low{color:#8fa8c8}
.flag-normal{color:#f0e6d8}

/* LOADING */
#loading{position:fixed;inset:0;background:#1e1610;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
#loading img{width:64px;height:64px;border-radius:16px}
#loading p{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:#c9a66b;opacity:.8}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:20px;color:#fff;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:slideDown .3s ease;white-space:nowrap}

/* WEEKLY STRIP */
.week-strip{display:flex;justify-content:space-around;padding:10px 14px;background:#1e1610;border-bottom:1px solid #2a2018}
.day-pill{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;border-radius:10px}
.day-pill.today{background:#3a2e24}
.day-name{font-size:10px;color:#8a7a70;text-transform:uppercase;letter-spacing:.08em}
.day-num{font-size:16px;font-weight:600;color:#f0e6d8}

/* SCHEDULE */
.schedule-day{background:#261e16;border-radius:14px;padding:14px;margin-bottom:10px;border-left:3px solid #3a2e24}
.schedule-day-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px}
.today-badge{background:#c9a66b22;color:#c9a66b;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.schedule-med-row{display:flex;align-items:center;gap:10px;padding:6px 0}

@media(max-width:480px){
  .form-grid{grid-template-columns:1fr}
  .stat-row{gap:6px}
}
</style>
</head>

// ── STORAGE ──────────────────────────────────────────────────────────────────
function resetApp() {
  if (!confirm("Reset everything? This will clear all names, medications and data.")) return;
  localStorage.clear();
  location.reload();
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getColor(p) { return state.colorMap[p] || "#8c7b74"; }
function getInitials(n) { return n.split(" ").map(x=>x[0]).join("").toUpperCase(); }
function getFiltered() {
  return state.selectedPerson === "All" ? state.meds : state.meds.filter(m=>m.person===state.selectedPerson);
}
function getAllPeople() { return [...state.people, ...state.pets]; }
function showToast(msg, type="success") {
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toast = {msg, type};
  render();
  state.toastTimer = setTimeout(()=>{ state.toast=null; render(); }, 2800);
}
function setState(updates) { Object.assign(state, updates); render(); }

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  state.meds = load("ss:meds", SAMPLE_MEDS);
  state.people = load("ss:people", DEFAULT_PEOPLE);
  state.pets = load("ss:pets", DEFAULT_PETS);
  state.colorMap = load("ss:colors", BASE_COLORS);
  state.emergencyProfiles = load("ss:emergency", {});
  state.docs = load("ss:docs", []);
  state.loaded = true;
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";
  render();
}

function takeMed(id) {

  showToast("✓ Medication marked as taken");
}
function deleteMed(id) {
  state.meds = state.meds.filter(m=>m.id!==id);
  save("ss:meds", state.meds);
  showToast("Medication removed","info");
  render();
}
function openAdd() {
  state.editMedId = null;
  state.form = {person:state.selectedPerson==="All"?"Cynthia":state.selectedPerson,name:"",dose:"",frequency:"Daily",time:"08:00",notes:"",pharmacy:""};
  setState({view:"add"});
}
function openEdit(med) {
  state.editMedId = med.id;
  state.form = {person:med.person,name:med.name,dose:med.dose,frequency:med.frequency,time:med.time,notes:med.notes||"",pharmacy:med.pharmacy||""};
  setState({view:"add"});
}
function submitForm() {
  if (!state.form.name||!state.form.dose) { showToast("Name and dose required","error"); return; }
  if (state.editMedId) {
    state.meds = state.meds.map(m=>m.id===state.editMedId?{...m,...state.form}:m);
    showToast("✓ Medication updated");
  } else {
    state.meds.push({id:Date.now(),...state.form,nextDue:"Today "+state.form.time,taken:false});
    showToast("✓ Medication added");
  }
  save("ss:meds", state.meds);
  setState({view:"meds", editMedId:null});
}
function addPerson() {
  const name = state.newPersonName.trim();
  if (!name) return;
  if (state.people.includes(name)||state.pets.includes(name)) { showToast("Name already exists","error"); return; }
  const color = EXTRA_COLORS[state.people.length % EXTRA_COLORS.length];
  state.people.push(name);
  state.colorMap[name] = color;
  save("ss:people", state.people);
  save("ss:colors", state.colorMap);
  showToast("✓ "+name+" added");
  setState({showAddPerson:false, newPersonName:""});
}
function removePerson(name) {
  state.people = state.people.filter(p=>p!==name);
  state.pets = state.pets.filter(p=>p!==name);
  state.meds = state.meds.filter(m=>m.person!==name);
  if (state.selectedPerson===name) state.selectedPerson="All";
  save("ss:people", state.people);
  save("ss:pets", state.pets);
  save("ss:meds", state.meds);
  showToast(name+" removed","info");
  render();
}
function addFromScan() {
  if (!state.scanResult) return;
  const r = state.scanResult;
  const person = state.selectedPerson==="All"?"Cynthia":state.selectedPerson;
  state.meds.push({id:Date.now(),person,name:r.name,dose:r.dose,frequency:r.directions||"Daily",time:"08:00",notes:`Prescriber: ${r.prescriber||""} | ${r.pharmacy||""}`,nextDue:"Today 8:00 AM",taken:false});
  save("ss:meds", state.meds);
  showToast("✓ Added from scan");
  setState({view:"meds", scanResult:null, scanImagePreview:null});
}

// ── CLAUDE API ───────────────────────────────────────────────────────────────
async function callClaude(messages, maxTokens=1200) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages})
  });
  const d = await r.json();
  const text = (d.content||[]).find(b=>b.type==="text")?.text||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function handleImageUpload(file, mode) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(",")[1];
    const mt = file.type;
    if (mode==="scan") {
      setState({scanImagePreview:ev.target.result, scanActive:true, scanResult:null, scanError:null});
      try {
        const result = await callClaude([{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:mt,data:base64}},
          {type:"text",text:'Read this prescription label. Return ONLY JSON: {"name":"","dose":"","directions":"","prescriber":"","pharmacy":"","refills":"","ndc":"","patient":""}. Use "Not found" for missing fields.'}
        ]}]);
        setState({scanActive:false, scanResult:result});
      } catch(e) {
        setState({scanActive:false, scanError:"Couldn't read the label. Try a clearer photo."});
      }
    } else if (mode==="pill") {
      setState({pillImage:ev.target.result, pillLoading:true, pillResult:null, pillError:null});
      await runPillIdentify({type:"image",source:{type:"base64",media_type:mt,data:base64}});
    } else if (mode==="doc") {
      const person = state.docsPerson||state.people[0];
      setState({docUploading:true});
      try {
        const cb = file.type==="application/pdf"
          ? {type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}}
          : {type:"image",source:{type:"base64",media_type:mt,data:base64}};
        const result = await callClaude([{role:"user",content:[cb,{type:"text",text:'Analyze this medical document. Return ONLY JSON: {"title":"","type":"Lab Results|Doctor Report|Prescription|Imaging|Discharge Summary|Other","date":null,"summary":"","keyValues":[{"label":"","value":"","flag":"normal|low|high"}],"diagnoses":[],"medications":[],"followUp":null}'}]}], 1500);
        const doc = {id:Date.now(),person,fileName:file.name,fileSize:Math.round(file.size/1024)+"KB",uploadDate:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),...result};
        state.docs.unshift(doc);
        save("ss:docs", state.docs);
        showToast("✓ Document analyzed and saved");
        setState({docUploading:false, docViewing:doc});
      } catch(e) {
        setState({docUploading:false});
        showToast("Analysis failed — try again","error");
      }
    }
  };
  reader.readAsDataURL(file);
}

async function runPillIdentify(imageBlock, imprint) {
  const currentMeds = state.meds.map(m=>m.name).join(", ")||"none";
  const content = [];
  if (imageBlock) content.push(imageBlock);
  content.push({type:"text",text:`${imageBlock?"Identify the pill in this photo.":"Identify pill with imprint: "+imprint} Current meds: ${currentMeds}. Return ONLY JSON: {"name":"","brandName":null,"strength":"","shape":"","color":"","imprint":"","category":"","usedFor":"","howItWorks":"","commonSideEffects":[],"seriousWarnings":[],"interactions":[{"drug":"","severity":"mild|moderate|severe","description":""}],"notes":null,"confidence":"high|medium|low"}`});
  try {
    const result = await callClaude([{role:"user",content}]);
    if (!result.name) setState({pillLoading:false, pillError:"Couldn't identify. Try clearer photo or type the imprint code."});
    else setState({pillLoading:false, pillResult:result});
  } catch(e) {
    setState({pillLoading:false, pillError:"Identification failed. Please try again."});
  }
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
function attachEvents() {
  // Data-action buttons
  document.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", handleAction);
  });
  // File upload inputs
  document.querySelectorAll("[data-upload]").forEach(el => {
    el.addEventListener("change", e => {
      handleImageUpload(e.target.files[0], e.target.dataset.upload);
    });
  });
  // Live form fields
  const np = document.getElementById("newPersonInput");
  if (np) {
    np.addEventListener("input", e => state.newPersonName = e.target.value);
    np.addEventListener("keydown", e => { if(e.key==="Enter") addPerson(); if(e.key==="Escape") setState({showAddPerson:false,newPersonName:""}); });
    np.focus();
  }
  const pi = document.getElementById("pillImprintInput");
  if (pi) {
    pi.addEventListener("input", e => { state.pillImprint = e.target.value.toUpperCase(); pi.value = state.pillImprint; });
    pi.addEventListener("keydown", e => { if(e.key==="Enter") identifyByImprint(); });
  }
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;
  switch(action) {
    case "setView": setState({view:el.dataset.view, docViewing:null}); break;
    case "selectPerson": setState({selectedPerson:el.dataset.person}); break;
    case "removePerson": removePerson(el.dataset.person); break;
    case "showAddPerson": setState({showAddPerson:true}); break;
    case "addPerson": addPerson(); break;
    case "cancelAddPerson": setState({showAddPerson:false,newPersonName:""}); break;
    case "openAdd": openAdd(); break;
    case "takeMed": takeMed(parseInt(el.dataset.id)); break;
    case "editMed": openEdit(state.meds.find(m=>m.id===parseInt(el.dataset.id))); break;
    case "deleteMed": deleteMed(parseInt(el.dataset.id)); break;
    case "submitForm": readFormAndSubmit(); break;
    case "addFromScan": addFromScan(); break;
    case "clearScan": setState({scanResult:null,scanImagePreview:null,scanError:null}); break;
    case "setPillTab": setState({pillTab:el.dataset.tab,pillResult:null,pillError:null,pillImage:null,pillImprint:""}); break;
    case "identifyByImprint": identifyByImprint(); break;
    case "clearPill": setState({pillResult:null,pillImage:null,pillImprint:"",pillError:null}); break;
    case "addPillToMeds": {
      const r=state.pillResult;
      state.form={person:state.selectedPerson==="All"?"Cynthia":state.selectedPerson,name:r.name+(r.strength?" "+r.strength:""),dose:r.strength||"",frequency:"Daily",time:"08:00",notes:`Identified via pill lookup. ${r.usedFor}`,pharmacy:""};
      setState({view:"add",editMedId:null});
      break;
    }
    case "setDocsPerson": setState({docsPerson:el.dataset.person,docViewing:null}); break;
    case "viewDoc": setState({docViewing:state.docs.find(d=>d.id===parseInt(el.dataset.id))}); break;
    case "clearDocViewing": setState({docViewing:null}); break;
    case "deleteDoc": {
      state.docs=state.docs.filter(d=>d.id!==parseInt(el.dataset.id));
      save("ss:docs",state.docs);
      showToast("Document removed","info");
      setState({docViewing:null});
      break;
    }
    case "setEmergencyPerson": setState({emergencyPerson:el.dataset.person,editingEmergency:false}); break;
    case "startEditEmergency": {
      const p=state.emergencyPerson||state.people[0];
      setState({editingEmergency:true,emergencyForm:{...(state.emergencyProfiles[p]||{})}});
      break;
    }
    case "saveEmergency": saveEmergency(); break;
    case "cancelEmergencyEdit": setState({editingEmergency:false}); break;
    case "setReportPerson": setState({reportPerson:el.dataset.person}); break;
    case "setReportRange": setState({reportRange:el.dataset.range}); break;
  }
}

function readFormAndSubmit() {
  state.form.person = document.getElementById("f-person")?.value || state.form.person;
  state.form.name = document.getElementById("f-name")?.value || "";
  state.form.dose = document.getElementById("f-dose")?.value || "";
  state.form.frequency = document.getElementById("f-freq")?.value || "Daily";
  state.form.time = document.getElementById("f-time")?.value || "08:00";
  state.form.pharmacy = document.getElementById("f-pharmacy")?.value || "";
  state.form.notes = document.getElementById("f-notes")?.value || "";
  submitForm();
}

function saveEmergency() {
  const p = state.emergencyPerson||state.people[0];
  const fields = ["blood","dob","weight","doctor","doctorPhone","emergency","emergencyPhone","allergies","conditions"];
  fields.forEach(k => {
    const el = document.getElementById("ef-"+k);
    if (el) state.emergencyForm[k] = el.value;
  });
  state.emergencyProfiles[p] = {...state.emergencyForm};
  save("ss:emergency", state.emergencyProfiles);
  showToast("✓ Emergency info saved");
  setState({editingEmergency:false});
}

function identifyByImprint() {
  const val = document.getElementById("pillImprintInput")?.value||state.pillImprint;
  if (!val.trim()) return;
  state.pillImprint = val.trim().toUpperCase();
  setState({pillLoading:true,pillResult:null,pillError:null,pillImage:null});
  runPillIdentify(null, state.pillImprint);
}

// ── START ────────────────────────────────────────────────────────────────────
window.addEventListener("load", init);

// ── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.warn);
}

// ── INSTALL BANNER ───────────────────────────────────────────────────────────
(function() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  let installPrompt = null;

  // Clear any old dismissal so banner always shows
  localStorage.removeItem('ss-ib');

  function showBanner() {
    document.getElementById('install-banner').classList.add('show');
  }
  window.dismissInstallBanner = function() {
    document.getElementById('install-banner').classList.remove('show');
  };

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    installPrompt = e;
    if (!isStandalone) setTimeout(showBanner, 1000);
  });

  document.getElementById('btn-install').addEventListener('click', async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    const { outcome } = await installPrompt.userChoice;
    installPrompt = null;
    if (outcome === 'accepted') window.dismissInstallBanner();
  });

  if (isIOS && !isStandalone) {
    document.getElementById('android-section').style.display = 'none';
    document.getElementById('ios-steps').style.display = 'flex';
    setTimeout(showBanner, 1000);
  }
})();
</script>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <button class="ib-close" onclick="dismissInstallBanner()">×</button>
  <div class="ib-top">
    <div class="ib-icon"><img src="/icon-192.png" alt="ScriptSchedule"></div>
    <div class="ib-words">
      <h3>Add ScriptSchedule to your Home Screen</h3>
      <p>Works like a real app — free, no App Store needed</p>
    </div>
  </div>
  <div id="android-section">
    <button id="btn-install">&#11015; Add to Home Screen</button>
  </div>
  <div id="ios-steps">
    <div class="ios-step"><span class="snum">1</span><span class="sico">&#11014;&#65039;</span><span class="stxt">Tap the <b>Share</b> button at the bottom of Safari</span></div>
    <div class="ios-step"><span class="snum">2</span><span class="sico">&#10133;</span><span class="stxt">Scroll and tap <b>Add to Home Screen</b></span></div>
    <div class="ios-step"><span class="snum">3</span><span class="sico">&#9989;</span><span class="stxt">Tap <b>Add</b> in the top right — you're done!</span></div>
  </div>
</div>
