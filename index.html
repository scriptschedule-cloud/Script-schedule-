<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScriptSchedule</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #2C2420;
      color: white;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 24px;
    }

    .card {
      background: rgba(58, 49, 44, 0.9);
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin: 8px 0 12px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .med-row {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <h1>ScriptSchedule</h1>

  <div class="card">
    <h2>Add Family Member</h2>
    <input id="name" placeholder="Name">
    <button id="addBtn">Add</button>
  </div>

  <div id="members"></div>

  <script>
    let data = JSON.parse(localStorage.getItem('scriptSchedule') || '[]');

    function save() {
      localStorage.setItem('scriptSchedule', JSON.stringify(data));
      render();
    }

    function addMember() {
      const input = document.getElementById('name');
      const name = input.value.trim();
      if (!name) return;

      data.push({ name: name, meds: [] });
      input.value = '';
      save();
    }

    function addMed(i) {
      const med = prompt('Medication name?');
      if (!med || !med.trim()) return;

      data[i].meds.push({
        name: med.trim(),
        taken: false
      });

      save();
    }

    function toggle(i, j) {
      data[i].meds[j].taken = !data[i].meds[j].taken;
      save();
    }

    function render() {
      const container = document.getElementById('members');
      container.innerHTML = '';

      data.forEach((person, i) => {
        const div = document.createElement('div');
        div.className = 'card';

        const title = document.createElement('h3');
        title.textContent = person.name;
        div.appendChild(title);

        const addMedBtn = document.createElement('button');
        addMedBtn.textContent = 'Add Medication';
        addMedBtn.onclick = function () { addMed(i); };
        div.appendChild(addMedBtn);

        person.meds.forEach((med, j) => {
          const medDiv = document.createElement('div');
          medDiv.className = 'med-row';

          const p = document.createElement('p');
          p.textContent = med.name + ' — ' + (med.taken ? '✅ Taken' : '❌ Not taken');
          medDiv.appendChild(p);

          const markBtn = document.createElement('button');
          markBtn.textContent = 'Mark';
          markBtn.onclick = function () { toggle(i, j); };
          medDiv.appendChild(markBtn);

          div.appendChild(medDiv);
        });

        container.appendChild(div);
      });
    }

    document.getElementById('addBtn').addEventListener('click', addMember);
    render();
  </script>
</body>
</html>
